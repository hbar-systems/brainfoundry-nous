services:

  # Ollama — local model inference
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network
    restart: unless-stopped

  # Brain API
  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --proxy-headers --no-access-log
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        HBAR_GIT_COMMIT: ${HBAR_GIT_COMMIT:-unknown}
        HBAR_BUILD_TIME: ${HBAR_BUILD_TIME:-unknown}
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-llm_db}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - SEMANTIC_DB_PATH=/app/extensions/brain/semantic.db
      - NODEOS_URL=http://nodeos:8001
      - HBAR_BRAIN_API_KEY=${HBAR_BRAIN_API_KEY}
      - HBAR_IDENTITY_SECRET=${HBAR_IDENTITY_SECRET}
      - HBAR_ENV=${HBAR_ENV:-dev}
      - KERNEL_RATE_LIMIT_MAX=30
      - KERNEL_RATE_LIMIT_WINDOW=60
      - REDIS_URL=redis://redis:6379/0
      - DEV_ENABLE_MEMORY_APPEND=0
      - BRAIN_ID=${BRAIN_ID:-my-brain-01}
      - BRAIN_NAME=${BRAIN_NAME:-My Brain}
      - BRAIN_OWNER=${BRAIN_OWNER}
      - BRAIN_PRIVATE_KEY=${BRAIN_PRIVATE_KEY}
      - BRAIN_PUBLIC_KEY=${BRAIN_PUBLIC_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RAG_TIER1=${RAG_TIER1:-identity}
      - RAG_TIER2A=${RAG_TIER2A:-thinking}
      - RAG_TIER2B=${RAG_TIER2B:-projects}
      - RAG_TIER2C=${RAG_TIER2C:-writing}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      - postgres
      - nodeos
      - redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 2s
      retries: 6
      start_period: 10s
    volumes:
      - ./input_samples:/app/input_samples:ro
      - ./extensions/brain:/app/extensions/brain:rw
      - ./prepared_docs:/app/prepared_docs:rw
      - ./api:/app/api
      - api_data:/app/data
    networks:
      - llm-network
    restart: unless-stopped

  # CognitiveOS — governance kernel
  nodeos:
    build:
      context: ./nodeos
      dockerfile: Dockerfile
    environment:
      - NODEOS_SIGNING_SECRET=${NODEOS_SIGNING_SECRET}
      - NODEOS_HMAC_SECRET=${NODEOS_SIGNING_SECRET}
      - NODEOS_DB_PATH=/data/nodeos.db
      - NODEOS_PUSH_BRANCH_ALLOWLIST=${NODEOS_PUSH_BRANCH_ALLOWLIST:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HBAR_ENV=${HBAR_ENV:-dev}
    volumes:
      - nodeos_data:/data
    networks:
      - llm-network
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Console UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8000"
      NEXT_PUBLIC_API_BASE: "http://api:8000"
      NODEOS_INTERNAL_URL: "http://nodeos:8001"
    depends_on:
      - api
      - nodeos
    networks:
      - llm-network
    restart: unless-stopped

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:54332:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-llm_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./vector-db:/docker-entrypoint-initdb.d:Z
    networks:
      - llm-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - llm-network
    restart: unless-stopped

networks:
  llm-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  nodeos_data:
  redis_data:
  api_data:
