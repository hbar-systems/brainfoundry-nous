services:
  # Ollama container for serving Mistral/LLaVA
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network
    restart: unless-stopped
    
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_db
      - OLLAMA_URL=http://${OLLAMA_BASE:-host.docker.internal:11434}
      - SEMANTIC_DB_PATH=/app/extensions/brain/semantic.db
    depends_on:
      - postgres
    volumes:
      - ./input_samples:/app/input_samples:ro
      - ./extensions/brain:/app/extensions/brain:rw
      - ./prepared_docs:/app/prepared_docs:rw
    networks:
      - llm-network

  # Next.js Frontend
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - api
    networks:
      - llm-network


  # Postgres with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "54322:5432"
    environment:
      - POSTGRES_DB=llm_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./vector-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - llm-network
    restart: unless-stopped

networks:
  llm-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data: 