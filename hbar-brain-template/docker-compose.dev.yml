# Development Configuration - Optimized for MacBook Air 8GB
# Use this for development: docker compose -f docker-compose.dev.yml up

version: '3.8'

services:
  # Ollama with smaller models for development
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    networks:
      - llm-network
    restart: unless-stopped
    environment:
      - OLLAMA_MODELS=mistral:7b,qwen2.5:3b,llama3.2:1b  # Smaller models for dev

  # FastAPI Backend (same as production)
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_db
      - OLLAMA_URL=http://ollama:11434
      - ENV=development
      - DEFAULT_MODEL=llama3.2:1b  # Lightweight default for testing
    depends_on:
      - postgres
    volumes:
      - ./input_samples:/app/input_samples:ro
    networks:
      - llm-network

  # Next.js Frontend (same as production)
  ui:
    build: ./ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - api
    networks:
      - llm-network

  # Postgres with pgvector (same as production)
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "54322:5432"
    environment:
      - POSTGRES_DB=llm_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./vector-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - llm-network
    restart: unless-stopped

networks:
  llm-network:
    driver: bridge

volumes:
  postgres_dev_data:
  ollama_dev_data: 