services:
  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --proxy-headers --no-access-log
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_db
      - OLLAMA_URL=http://ollama:11434
      - DISABLE_LLM=true
      - NODEOS_URL=http://nodeos:8001
      - REDIS_URL=redis://redis:6379/0
      - HBAR_IDENTITY_SECRET=dev-secret-please-change
      - DEV_ENABLE_MEMORY_APPEND=1
    depends_on:
      - postgres
      - nodeos
      - redis
    networks:
      - llm-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - llm-network
