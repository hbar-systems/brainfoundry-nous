services:
  api:
    volumes:
      - ./instances/hbar.brain.demo/api/brain_identity.yaml:/app/api/brain_identity.yaml:ro,Z
    environment:
      - HBAR_ENV=${HBAR_ENV:-dev}
      - HBAR_IDENTITY_SECRET=${HBAR_IDENTITY_SECRET}
      - DEV_ENABLE_MEMORY_APPEND=${DEV_ENABLE_MEMORY_APPEND:-0}
      - NODEOS_URL=${NODEOS_URL:-http://nodeos:8001}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
    ports:
      - "8110:8000"

  ui:
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8000}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://api:8000}
    ports:
      - "${UI_PORT:-3110}:3000"
